<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1f2937;
            color: white;
        }

        .box {
            background: #374151;
            padding: 35px;
            border-radius: 15px;
            text-align: center;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #1f2937;
            color: white;
        }

        input:focus {
            outline: 1px solid #3b82f6;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        /* Forgot password styling */
        .forgot {
            margin-top: 10px;
            font-size: 14px;
        }

        .forgot a {
            color: #60a5fa;   /* changed color */
            text-decoration: none;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #3b82f6;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login 🔐</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="forgot">
        <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    </p>
</div>

<script>
function showToast(msg) {
    let t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

function forgotPassword() {
    showToast("Use admin / 1234");
}

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234") {
        showToast("Login successful");
        setTimeout(() => window.location.href = "index.html", 1000);
    } else {
        showToast("Invalid login");
    }
}
</script>

</body>
</html>
