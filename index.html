<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Solutions Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Web Solutions Portal</h1>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h2>Build <span>Modern Websites</span></h2>
        <p>Interactive, responsive and user-friendly solutions</p>
        <button onclick="goToLogin()">Get Started</button>
    </div>
</section>

<!-- SERVICES -->
<section class="services">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">
            <p>Web Design</p>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/919/919828.png">
            <p>JavaScript</p>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
            <p>Responsive UI</p>
        </div>
    </div>
</section>

<!-- ABOUT -->
<section class="about">
    <h2>About Us</h2>
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    <p>This project demonstrates modern UI using HTML, CSS and JavaScript.</p>
</section>

<!-- CONTACT -->
<section class="contact">
    <h2>Contact</h2>

    <input type="text" id="name" placeholder="Your Name">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button onclick="validateForm()">Send Message</button>
</section>

<footer>
    <p>© 2025 Web Solutions Portal</p>
</footer>

<script src="script.js"></script>
</body>
</html>
